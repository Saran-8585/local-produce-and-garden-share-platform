services:
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=local_produce_secret_key_2024_garden_share
      - MONGODB_URI=mongodb://mongodb:27017/local_produce
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo_data:
